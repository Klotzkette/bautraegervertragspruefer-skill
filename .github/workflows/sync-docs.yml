name: Sync skill files to docs/

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'skill/SKILL.md'
      - 'skill/MINI_SKILL.md'
      - 'vertragsdokumente/bautraegervertrag/bautraegervertrag.pdf'
      - 'vertragsdokumente/bautraegervertrag/bautraegervertrag.docx'
      - 'vertragsdokumente/bautraegervertrag/bautraegervertrag.md'
      - 'vertragsdokumente/bautraegervertrag-marewald/bautraegervertrag-marewald.pdf'
      - 'vertragsdokumente/bautraegervertrag-marewald/bautraegervertrag-marewald.docx'
      - 'vertragsdokumente/bautraegervertrag-marewald/bautraegervertrag-marewald.md'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy skill files to docs/
        run: |
          mkdir -p docs/vertragsdokumente/bautraegervertrag
          mkdir -p docs/vertragsdokumente/bautraegervertrag-marewald
          cp skill/SKILL.md docs/SKILL.md
          cp skill/MINI_SKILL.md docs/MINI_SKILL.md
          cp vertragsdokumente/bautraegervertrag/bautraegervertrag.pdf  docs/vertragsdokumente/bautraegervertrag/bautraegervertrag.pdf
          cp vertragsdokumente/bautraegervertrag/bautraegervertrag.docx docs/vertragsdokumente/bautraegervertrag/bautraegervertrag.docx
          cp vertragsdokumente/bautraegervertrag/bautraegervertrag.md   docs/vertragsdokumente/bautraegervertrag/bautraegervertrag.md
          cp vertragsdokumente/bautraegervertrag-marewald/bautraegervertrag-marewald.pdf  docs/vertragsdokumente/bautraegervertrag-marewald/bautraegervertrag-marewald.pdf
          cp vertragsdokumente/bautraegervertrag-marewald/bautraegervertrag-marewald.docx docs/vertragsdokumente/bautraegervertrag-marewald/bautraegervertrag-marewald.docx
          cp vertragsdokumente/bautraegervertrag-marewald/bautraegervertrag-marewald.md   docs/vertragsdokumente/bautraegervertrag-marewald/bautraegervertrag-marewald.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/SKILL.md docs/MINI_SKILL.md docs/vertragsdokumente/; then
            echo "docs files unchanged — nothing to commit."
            exit 0
          fi
          git add docs/SKILL.md docs/MINI_SKILL.md docs/vertragsdokumente/
          git commit -m "chore(docs): sync files for GitHub Pages"
          git push
