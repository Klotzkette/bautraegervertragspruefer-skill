name: Validate repository

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep unzip

      - name: Validate repository invariants
        run: bash scripts/validate_repo.sh
